# SocialMesh2 Production — lightweight (no Temporal)
services:
  socialmesh2:
    image: ghcr.io/v2-mason/socialmesh2:latest
    container_name: socialmesh2
    restart: always
    environment:
      MAIN_URL: "https://social.mattera3dprint.com"
      FRONTEND_URL: "https://social.mattera3dprint.com"
      NEXT_PUBLIC_BACKEND_URL: "https://social.mattera3dprint.com/api"
      JWT_SECRET: "81b5c4a779d11f08abd934fcdbc19c8a2cca9f6790c11a9668e647ca16df1c49"
      DATABASE_URL: "postgresql://postiz-user:postiz-password@sm2-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://sm2-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      TEMPORAL_DISABLED: "true"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      FACEBOOK_APP_ID: "816973801422776"
      FACEBOOK_APP_SECRET: "e90750392b6bdf5ae3b5cc08f7d430a2"
      TIKTOK_CLIENT_ID: "sbawbe9sjra3s298en"
      TIKTOK_CLIENT_SECRET: "87R5z6UgrE4yYOa0um0dMftCmcnI4yWj"
      COWORK_DISCORD_WEBHOOK: "${COWORK_DISCORD_WEBHOOK:-}"
      COWORK_API_KEY: "${COWORK_API_KEY:-}"
      OPENAI_API_KEY: ""
      API_LIMIT: 30
      NX_ADD_PLUGINS: false
    volumes:
      - postiz_postiz-config:/config/
      - postiz_postiz-uploads:/uploads/
    ports:
      - "127.0.0.1:4007:5000"
    networks:
      - sm2-network
    depends_on:
      sm2-postgres:
        condition: service_healthy
      sm2-redis:
        condition: service_healthy

  sm2-postgres:
    image: postgres:17-alpine
    container_name: sm2-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postiz_postgres-volume:/var/lib/postgresql/data
    networks:
      - sm2-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3

  sm2-redis:
    image: redis:7.2
    container_name: sm2-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz_postiz-redis-data:/data
    networks:
      - sm2-network

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./static:/srv/static
      - postiz_caddy-data:/data
      - postiz_caddy-config:/config
    networks:
      - sm2-network

volumes:
  postiz_postiz-config:
    external: true
  postiz_postiz-uploads:
    external: true
  postiz_postgres-volume:
    external: true
  postiz_postiz-redis-data:
    external: true
  postiz_caddy-data:
    external: true
  postiz_caddy-config:
    external: true

networks:
  sm2-network:
